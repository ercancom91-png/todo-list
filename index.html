<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bahçem — Niyet Tohumları</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Decorative floating leaves -->
    <div class="floaters" aria-hidden="true">
        <span class="floater f1">🍃</span>
        <span class="floater f2">🌿</span>
        <span class="floater f3">🍃</span>
        <span class="floater f4">🌸</span>
        <span class="floater f5">🌿</span>
    </div>

    <!-- AUTH SCREEN -->
    <div class="container auth-container" id="authScreen" hidden>
        <header class="app-header">
            <div class="garden-logo" aria-hidden="true">🌱</div>
            <h1 id="authTitle">Bahçene Gir</h1>
            <p class="subtitle" id="authSubtitle">Niyet tohumlarına dönmek için giriş yap.</p>
        </header>

        <form class="auth-form" id="authForm">
            <div class="field">
                <label for="authEmail">E-posta</label>
                <input type="email" id="authEmail" required autocomplete="email" placeholder="ornek@mail.com">
            </div>
            <div class="field">
                <label for="authPassword">Şifre</label>
                <input type="password" id="authPassword" required minlength="6" autocomplete="current-password" placeholder="En az 6 karakter">
            </div>

            <div class="auth-message" id="authMessage" hidden></div>

            <button type="submit" class="btn-primary" id="authSubmit">Giriş Yap</button>

            <p class="auth-switch">
                <span id="authSwitchText">Henüz bahçen yok mu?</span>
                <button type="button" class="link-btn" id="authToggle">Bahçeni oluştur</button>
            </p>
        </form>
    </div>

    <!-- APP SCREEN -->
    <div class="container app-container" id="appScreen" hidden>
        <header class="app-header">
            <div class="user-bar">
                <span class="user-email" id="userEmail"></span>
                <button class="link-btn" id="signOutBtn">Çıkış</button>
            </div>
            <div class="garden-logo" aria-hidden="true">🌿</div>
            <h1>Bahçem</h1>
            <p class="subtitle" id="subtitle">Bugün hangi tohumları ekeceksin?</p>
        </header>

        <form class="add-form" id="addForm">
            <input
                type="text"
                id="taskInput"
                placeholder="Yeni bir niyet tohumu ek..."
                autocomplete="off"
                maxlength="120"
                required
            >
            <button type="submit" class="btn-add" aria-label="Tohum ek" title="Tohum ek">
                <span>🌱</span>
            </button>
        </form>

        <div class="filters" id="filters">
            <button class="filter-btn active" data-filter="all">Tümü</button>
            <button class="filter-btn" data-filter="active">Filizlenenler</button>
            <button class="filter-btn" data-filter="completed">Çiçeklenenler</button>
        </div>

        <ul class="task-list" id="taskList"></ul>

        <div class="empty-state" id="emptyState">
            <div class="empty-icon">🌿</div>
            <p>Bahçen henüz boş.</p>
            <span>İlk niyet tohumunu ekmeye ne dersin?</span>
        </div>

        <footer class="app-footer" id="appFooter" hidden>
            <span id="remainingCount">0 tohum filizleniyor</span>
            <button class="btn-clear" id="clearCompleted">Çiçekleri hasat et</button>
        </footer>
    </div>

    <div class="boot" id="boot">
        <div class="spinner"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
